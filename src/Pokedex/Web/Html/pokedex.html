<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéDuelo - PokéDEX Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Css/pokedex.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="../Js/datos.js"></script>
</head>
<body>

    <div class="pokedex-frame">
        <header class="pokedex-header">
            <div class="blue-sensor"></div>
            <h1 class="pokedex-title">SISTEMA NACIONAL</h1>
        </header>

        <nav class="gen-filter">
            <div class="gen-row">
                <button onclick="cargarGen(1)">G1</button>
                <button onclick="cargarGen(2)">G2</button>
                <button onclick="cargarGen(3)">G3</button>
                <button onclick="cargarGen(4)">G4</button>
                <button onclick="cargarGen(5)">G5</button>
            </div>
            <div class="gen-row">
                <button onclick="cargarGen(6)">G6</button>
                <button onclick="cargarGen(7)">G7</button>
                <button onclick="cargarGen(8)">G8</button>
                <button onclick="cargarGen(9)">G9</button>
                <button onclick="cargarGen(10)">G10</button>
            </div>
            <div class="search-row">
                <button onclick="cargarGen(0)" class="btn-all">VER TODAS</button>
                <input type="text" id="poke-search" placeholder="BUSCAR POKÉMON..." onkeyup="buscar()" autocomplete="off">
            </div>
        </nav>

        <main id="pokedex-screen" class="pokedex-screen">
            <p class="blink" style="grid-column: span 3; margin-top: 150px;">SISTEMA ONLINE.<br>ELIJE UNA GENERACIÓN.</p>
        </main>

        <footer class="pokedex-footer">
            <button class="btn-menu-back" onclick="location.href='../Html/index.html'">VOLVER AL MENÚ</button>
        </footer>
    </div>

    <script>
        let genActual = 0;
        let vista3D = false;

        const infoGens = {
            1: { j: [ {n:"ROJO", c:"#FF0000"}, {n:"AZUL", c:"#0000FF"}, {n:"VERDE", c:"#00FF00"} ], s: ["red", "blue", "yellow", "firered", "leafgreen"] },
            2: { j: [ {n:"ORO", c:"#D4AF37"}, {n:"PLATA", c:"#C0C0C0"}, {n:"CRISTAL", c:"#ADD8E6"} ], s: ["gold", "silver", "crystal"] },
            3: { j: [ {n:"RUBÍ", c:"#E0115F"}, {n:"ZAFIRO", c:"#0F52BA"}, {n:"ESMERALDA", c:"#50C878"} ], s: ["ruby", "sapphire", "emerald"] },
            4: { j: [ {n:"DIAMANTE", c:"#B9F2FF"}, {n:"PERLA", c:"#FDD7E4"}, {n:"PLATINO", c:"#E5E4E2"} ], s: ["diamond", "pearl", "platinum"] },
            5: { j: [ {n:"NEGRO", c:"#444444"}, {n:"BLANCO", c:"#FFFFFF"} ], s: ["black", "white"] },
            6: { j: [ {n:"X", c:"#0055FF"}, {n:"Y", c:"#FF0000"} ], s: ["x", "y"] },
            7: { j: [ {n:"SOL", c:"#FFA500"}, {n:"LUNA", c:"#9370DB"}, ], s: ["sun", "moon"] },
            8: { j: [ {n:"ESPADA", c:"#00BFFF"}, {n:"ESCUDO", c:"#DC143C"} ], s: ["sword", "shield"] },
            9: { j: [ {n:"ESCARLATA", c:"#FF2400"}, {n:"PÚRPURA", c:"#800080"} ], s: ["scarlet", "violet"] },
            10: { j: [ {n:"VIENTO", c:"#00E5FF"}, {n:"OLA", c:"#0044FF"} ], s: ["winds", "waves"] }
        };

        const tiposTraducidos = {
            grass: "PLANTA", fire: "FUEGO", water: "AGUA", bug: "BICHO", normal: "NORMAL",
            poison: "VENENO", electric: "ELÉCTRICO", ground: "TIERRA", fairy: "HADA", fighting: "LUCHA",
            psychic: "PSÍQUICO", rock: "ROCA", ghost: "FANTASMA", ice: "HIELO", dragon: "DRAGÓN",
            dark: "SINIESTRO", steel: "ACERO", flying: "VOLADOR"
        };

        const coloresTipos = {
            grass: "#78C850", fire: "#F08030", water: "#6890F0", bug: "#A8B820", normal: "#A8A878",
            poison: "#A040A0", electric: "#F8D030", ground: "#E0C068", fairy: "#EE99AC", fighting: "#C03028",
            psychic: "#F85888", rock: "#B8A038", ghost: "#705898", ice: "#98D8D8", dragon: "#7038F8",
            dark: "#705848", steel: "#B8B8D0", flying: "#A890F0"
        };

        function pintarJuegos(gen) {
            return infoGens[gen].j.map(juego => `<span style="color:${juego.c}">${juego.n}</span>`).join(' <span style="color:#fff">/</span> ');
        }

        function obtenerGenPorID(id) {
            if (id <= 151) return 1; if (id <= 251) return 2; if (id <= 386) return 3;
            if (id <= 493) return 4; if (id <= 649) return 5; if (id <= 721) return 6;
            if (id <= 809) return 7; if (id <= 905) return 8; if (id <= 1025) return 9;
            return 10;
        }

        async function verDetalle(id) {
            if (id < 1) return;
            
            const screen = document.getElementById('pokedex-screen');
                
            screen.innerHTML = `
                <div style="display:flex; justify-content:center; align-items:center; height:100%; width:100%; grid-column: span 3;">
                    <p class="blink">CONECTANDO...</p>
                </div>`;

            try {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const data = await res.json();
                const resSpec = await fetch(data.species.url);
                const dataSpec = await resSpec.json();

                const pokeGen = obtenerGenPorID(id);
                const nombresJuegosPintados = pintarJuegos(pokeGen);
                
                let entryEs = dataSpec.flavor_text_entries.find(e => 
                    e.language.name === 'es' && infoGens[pokeGen].s.includes(e.version.name)
                );
                if (!entryEs) entryEs = dataSpec.flavor_text_entries.find(e => e.language.name === 'es');
                let desc = entryEs ? entryEs.flavor_text.replace(/\f/g, ' ').replace(/\n/g, ' ') : "Descripción no disponible.";

                const tiposHtml = data.types.map((t, index) => {
                    const nombreTipo = tiposTraducidos[t.type.name] || t.type.name.toUpperCase();
                    const colorTipo = coloresTipos[t.type.name] || '#777';
                    return `<div class="stat-item stat-type" style="background:${colorTipo}; color:white; border:none;">TIPO ${index + 1} <span>${nombreTipo}</span></div>`;
                }).join("");

                const modelSource = `../../../../assets-main/models/opt/regular/${id}.glb`;
                const urlPoster = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;

                const contenidoImagen = vista3D 
                ? `<model-viewer 
                    id="pokedex-3d-viewer"
                    src="${modelSource}" 
                    poster="${urlPoster}" 
                    autoplay 
                    animation-name="*" 
                    auto-rotate 
                    camera-controls 
                    interaction-prompt="none" 
                    field-of-view="25deg"
                    exposure="0.7" 
                    shadow-intensity="1" 
                    shadow-softness="1"
                    style="width: 100%; height: 100%; display: block;">
                </model-viewer>`
                : `<img src="${urlPoster}" class="artwork-img" style="width: 100%; height: 100%; object-fit: contain; display: block;">`;

                screen.innerHTML = `
                    <div class="pokedex-view-detail">
                        <div class="view-main" style="display: flex; gap: 15px;">
                            <div class="view-left" style="width: 170px; text-align: center;">
                                <div class="img-box">
                                    ${contenidoImagen}
                                </div>
                                <p class="big-id">#${id.toString().padStart(3,'0')}</p>
                                <button class="btn-3d" onclick="toggleVista(${id})">${vista3D ? 'VER ARTE' : 'VER 3D'}</button>
                            </div>

                            <div class="view-right">
                                <h2 class="header-line">
                                    <span class="poke-name">${data.name.toUpperCase()}</span>
                                    <div class="gen-tag">GEN ${pokeGen}: ${nombresJuegosPintados}</div>
                                </h2>
                                <hr class="divider">
                                <div class="stats-grid">
                                    <div class="stat-item">PS <span>${data.stats[0].base_stat}</span></div>
                                    <div class="stat-item">AT <span>${data.stats[1].base_stat}</span></div>
                                    <div class="stat-item">DF <span>${data.stats[2].base_stat}</span></div>
                                    <div class="stat-item">SA <span>${data.stats[3].base_stat}</span></div>
                                    <div class="stat-item">SD <span>${data.stats[4].base_stat}</span></div>
                                    <div class="stat-item">VEL <span>${data.stats[5].base_stat}</span></div>
                                    <div class="stat-item">ALT <span>${data.height/10}m</span></div>
                                    <div class="stat-item">PES <span>${data.weight/10}kg</span></div>
                                    ${tiposHtml}
                                </div>
                            </div>
                        </div>
                        
                        <div class="view-bottom">
                            <div class="nav-controls">
                                <div class="nav-arrows">
                                    <button onclick="verDetalle(${id - 1})">&lt;</button>
                                    <button onclick="verDetalle(${id + 1})">&gt;</button>
                                </div>
                                <button class="btn-list" onclick="cargarGen(${pokeGen})">LISTA</button>
                            </div>
                            <div class="desc-box">
                                <strong>DESC:</strong> ${desc}
                            </div>
                        </div>
                    </div>`;

                const viewer = document.getElementById('pokedex-3d-viewer');
                if (viewer) {
                    viewer.addEventListener('load', () => {
                        const animations = viewer.availableAnimations;
                        if (animations.length > 0) {
                            viewer.animationName = animations[0];
                            viewer.play();
                        }
                    });
                }

            } catch (e) {
                console.error("Error cargando el Pokémon:", e);
                screen.innerHTML = `
                    <div style="text-align:center; padding-top:100px; grid-column: span 3;">
                        <p>ERROR AL CARGAR DATOS</p>
                        <button onclick="cargarGen(1)">VOLVER</button>
                    </div>`;
            }
        }

        function cargarGen(num) {
            document.getElementById('poke-search').value = "";
            genActual = num;
            const screen = document.getElementById('pokedex-screen');
            screen.innerHTML = "<p class='blink' style='grid-column: span 3; margin-top: 150px;'>CONECTANDO...</p>";
            setTimeout(() => {
                let html = ""; let globalId = 1;
                for (let g = 1; g <= 10; g++) {
                    if (pokedexData[g]) {
                        if (num === 0 || num === g) {
                            const nombresPintados = pintarJuegos(g);
                            html += `<div class="gen-header-fixed">GEN ${g}: ${nombresPintados}</div>`;
                            pokedexData[g].nombres.forEach((n) => {
                                html += `<div class="entry" onclick="verDetalle(${globalId})">#${globalId.toString().padStart(3,'0')} ${n.toUpperCase()}</div>`;
                                globalId++;
                            });
                        } else { globalId += pokedexData[g].nombres.length; }
                    }
                }
                screen.innerHTML = html;
                screen.scrollTop = 0;
            }, 200);
        }
        function toggleVista(id) { vista3D = !vista3D; verDetalle(id); }
        function buscar() {
            const q = document.getElementById('poke-search').value.toLowerCase().trim();
            const screen = document.getElementById('pokedex-screen');
            if (q === "") { cargarGen(genActual); return; }
            let html = ""; let globalId = 1;
            for (let g = 1; g <= 10; g++) {
                if (pokedexData[g]) {
                    pokedexData[g].nombres.forEach((n, idx) => {
                        let curId = globalId + idx;
                        if (n.toLowerCase().includes(q) || curId.toString() === q) {
                            html += `<div class="entry" onclick="verDetalle(${curId})">#${curId.toString().padStart(3,'0')} ${n.toUpperCase()}</div>`;
                        }
                    });
                    globalId += pokedexData[g].nombres.length;
                }
            }
            screen.innerHTML = html || "<p class='blink'>SIN RESULTADOS</p>";
        }
    </script>
</body>
</html>
