name: Pokemon 3D Asset Pipeline

on:
  push:
    paths:
      - "scripts/model_map.json"
    branches:
      - main
  workflow_dispatch:

jobs:
  process-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python Environment 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node Environment 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 1. Download & Pre-Purge
        env:
          SKETCHFAB_API_TOKEN: ${{ secrets.SKETCHFAB_TOKEN }}
        run: |
          pip install requests
          python scripts/download_sketchfab.py

      - name: 2. Optimize
        run: |
          npm install --global @gltf-transform/cli
          chmod +x scripts/optimize_models.sh
          ./scripts/optimize_models.sh

      - name: 3. Commit, Squash & Push 🚀
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/commit_push.sh
          ./scripts/commit_push.sh
